services:
  - type: web
    name: content-simulator
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: MODEL_NAME
        value: deepseek-v4-flash
      - key: MODEL_BASE_URL
        value: https://api.deepseek.com
      - key: MODEL_API_STYLE
        value: chat
      - key: MODEL_THINKING
        value: disabled
      - key: MODEL_REASONING_EFFORT
        value: low
      - key: MODEL_TIMEOUT_MS
        value: 45000
      - key: INVITE_CODES
        sync: false
